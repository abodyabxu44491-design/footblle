<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>رابط غير صحيح</title>
  <link rel="icon" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="robots" content="noindex,nofollow"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#040404;font-family:'Tajawal',sans-serif;
      display:flex;justify-content:center;align-items:center;
      min-height:100vh;color:#f0f0f0;overflow:hidden;
      padding:24px calc(24px + env(safe-area-inset-right,0)) 24px calc(24px + env(safe-area-inset-left,0));
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse at 25% 40%,rgba(201,160,43,.08) 0%,transparent 55%),
        radial-gradient(ellipse at 75% 70%,rgba(192,57,43,.07) 0%,transparent 55%);
    }
    .card{
      text-align:center;position:relative;z-index:1;max-width:380px;width:100%;
      animation:fadeIn .7s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .ic-wrap{
      width:92px;height:92px;margin:0 auto 22px;border-radius:26px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(201,160,43,.08);border:1px solid rgba(201,160,43,.2);
    }
    .ic-wrap svg{width:46px;height:46px;stroke:#C9A02B}
    h1{font-size:23px;color:#f0f0f0;margin-bottom:12px;font-weight:900}
    p{font-size:14px;color:#8b8b8b;line-height:1.9;margin-bottom:6px}
    .hint{
      margin-top:26px;padding:14px 16px;border-radius:14px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
      font-size:12.5px;color:#9a9a9a;line-height:1.8;
    }
    .footer{margin-top:34px;font-size:11px;color:#4a4a4a}
    .loader-line{
      margin-top:22px;font-size:12px;color:#C9A02B;display:none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ic-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.7 4.6 3.5 17.3A2 2 0 0 0 5.2 20.3h13.6a2 2 0 0 0 1.7-3L13.3 4.6a2 2 0 0 0-2.6 0z"/>
        <path d="M12 9v4"/><path d="M12 17h.01"/>
      </svg>
    </div>
    <h1>رابط غير صحيح</h1>
    <p>هذا الرابط لا يشير إلى بطولة محدّدة.</p>
    <p>تأكّد من فتح رابط البطولة الكامل الذي شاركه معك المنظّم.</p>

    <div class="hint">
      إذا وصلك رابط بطولة من قبل، افتحه مباشرةً من الرسالة.<br>
      لطلب رابط بطولتك، تواصل مع منظّم البطولة.
    </div>

    <div class="footer">منصة بطولات</div>
  </div>
</body>
</html>
